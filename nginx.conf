worker_processes auto;

events {
    worker_connections 1024;
}

http {
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    server {
        listen 8080;
        server_name _;

        # Health check
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # OpenAI-compatible chat completions endpoint
        location /v1/chat/completions {
            limit_req zone=api burst=60 nodelay;

            proxy_pass ${BACKEND_URL}/api/v1/chat/completions;
            proxy_set_header Host $proxy_host;
            proxy_set_header Authorization "Bearer ${CODEBUFF_API_KEY}";
            proxy_set_header Content-Type "application/json";
            proxy_set_header User-Agent "ai-sdk/openai-compatible/codebuff";
            proxy_set_header Accept "text/event-stream";
            proxy_set_header Connection "";

            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # Pass through auth errors clearly
            proxy_intercept_errors off;
        }

        # Models list endpoint (for compatibility)
        location /v1/models {
            default_type application/json;
            return 200 '{
                "object": "list",
                "data": [
                    {"id": "anthropic/claude-sonnet-4", "object": "model", "owned_by": "anthropic"},
                    {"id": "anthropic/claude-3.5-sonnet", "object": "model", "owned_by": "anthropic"},
                    {"id": "openai/gpt-4o", "object": "model", "owned_by": "openai"},
                    {"id": "google/gemini-2.5-pro", "object": "model", "owned_by": "google"},
                    {"id": "x-ai/grok-3", "object": "model", "owned_by": "x-ai"}
                ]
            }';
        }

        # Catch-all: proxy to codebuff backend API
        location /v1/ {
            limit_req zone=api burst=30 nodelay;

            proxy_pass ${BACKEND_URL}/api/v1/;
            proxy_set_header Host $proxy_host;
            proxy_set_header Authorization "Bearer ${CODEBUFF_API_KEY}";
            proxy_set_header Content-Type "application/json";
            proxy_set_header User-Agent "ai-sdk/openai-compatible/codebuff";
            proxy_read_timeout 60s;
        }

        # Reject everything else
        location / {
            return 404 '{"error": {"message": "Not found. Use /v1/chat/completions", "type": "invalid_request_error"}}';
            add_header Content-Type application/json;
        }
    }
}
