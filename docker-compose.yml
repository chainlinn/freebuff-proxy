services:
  freebuff-proxy:
    image: chainlinn/freebuff-proxy:dev
    ports:
      - '9090:8080'
    environment:
      # 方式1: 直接填 freebuff authToken
      # - CODEBUFF_API_KEY=your_token_here

      # 方式2: 留空 → 首次启动打印登录URL，浏览器打开登录后 token 自动保存到 volume
      - CODEBUFF_API_KEY=
    volumes:
      - freebuff-data:/app/data
    container_name: freebuff-proxy
    restart: unless-stopped

volumes:
  freebuff-data: